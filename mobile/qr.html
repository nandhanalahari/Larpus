<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>KOLANA · Expo QR</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { background:#0a0a0a; color:#eaeaea; font-family:ui-monospace,Menlo,Consolas,monospace;
         display:flex; flex-direction:column; align-items:center; justify-content:center;
         min-height:100vh; margin:0; gap:20px; padding:24px; }
  h1 { letter-spacing:6px; font-size:14px; color:#88ddff; margin:0; }
  #qr { background:#fff; padding:18px; border-radius:10px; width:480px; height:480px; }
  .url { font-size:16px; color:#88ddff; word-break:break-all; text-align:center; max-width:520px; }
  .hint { color:#777; font-size:13px; text-align:center; max-width:520px; line-height:1.6; }
</style>
</head>
<body>
  <h1>KOLANA · EXPO GO</h1>
  <img id="qr" alt="QR">
  <div class="url" id="url">loading…</div>
  <div class="hint">Open Expo Go on your phone → Scan QR code.<br>Phone must be on the same Wi-Fi as this laptop.</div>
<script>
  // The Expo dev URL gets injected by qr-server.js so this file stays static.
  const url = window.__EXPO_URL__ || 'exp://10.29.144.162:8081';
  document.getElementById('url').textContent = url;
  document.getElementById('qr').src =
    'https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=10&data=' + encodeURIComponent(url);
</script>
</body>
</html>
